name: Monitor upstream program.md

on:
  schedule:
    - cron: '0 9 * * 1'  # every Monday at 09:00 UTC
  workflow_dispatch:       # allow manual trigger

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch upstream SHA and content
        id: upstream
        run: |
          RESPONSE=$(curl -sf \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/karpathy/autoresearch/contents/program.md")
          SHA=$(echo "$RESPONSE" | jq -r '.sha')
          DOWNLOAD_URL=$(echo "$RESPONSE" | jq -r '.download_url')
          curl -sf "$DOWNLOAD_URL" > /tmp/upstream-program.md
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Read stored SHA
        id: stored
        run: |
          FILE=".github/upstream-program-md.sha"
          if [ -f "$FILE" ]; then
            echo "sha=$(cat $FILE)" >> "$GITHUB_OUTPUT"
          else
            echo "sha=" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate diff and open issue
        if: steps.upstream.outputs.sha != steps.stored.outputs.sha
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OLD_FILE=".github/upstream-program-md.txt"
          if [ -f "$OLD_FILE" ]; then
            DIFF=$(diff -u "$OLD_FILE" /tmp/upstream-program.md || true)
          else
            DIFF="(no previous content stored — first change detected)"
          fi

          BODY=$(cat <<EOF
          \`program.md\` in [karpathy/autoresearch](https://github.com/karpathy/autoresearch) has been updated.

          **Action required:** review the diff below and port any relevant improvements to \`app/services/autoresearcher_program.md\`.

          New SHA: \`${{ steps.upstream.outputs.sha }}\`

          ---

          \`\`\`diff
          ${DIFF}
          \`\`\`
          EOF
          )

          gh issue create \
            --title "upstream: karpathy/autoresearch program.md has changed" \
            --body "$BODY"

      - name: Update stored SHA and content
        if: steps.upstream.outputs.sha != steps.stored.outputs.sha
        run: |
          echo "${{ steps.upstream.outputs.sha }}" > .github/upstream-program-md.sha
          cp /tmp/upstream-program.md .github/upstream-program-md.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/upstream-program-md.sha .github/upstream-program-md.txt
          git commit -m "chore: update upstream program.md snapshot to ${{ steps.upstream.outputs.sha }}"
          git push
